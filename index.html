<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Weight | Sheryl's Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:#fdf6ef;--ink:#2a1f1a;--rose:#c4756e;--rose-deep:#9a544e;--peach:#f4c5b3;
        }
        *{box-sizing:border-box}
        html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:transparent}
        .portal-frame{position:fixed;inset:0;width:100%;height:100%;border-radius:0;overflow:hidden;background:var(--cream);display:flex;flex-direction:column}
        .chat-head{background:var(--ink);color:#fff;padding:16px 20px;font-weight:600;font-size:15px;display:flex;align-items:center;gap:10px;flex-shrink:0}
        .chat-head .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--rose) 0%,var(--peach) 100%);display:flex;align-items:center;justify-content:center;font-size:15px}
        .chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:var(--cream)}
        .msg{max-width:82%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;animation:pop .3s cubic-bezier(.16,1,.3,1) both}
        @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
        .msg.user{align-self:flex-end;background:var(--rose);color:#fff;border-bottom-right-radius:5px}
        .msg.bot{align-self:flex-start;background:#fff;color:var(--ink);border:1px solid rgba(42,31,26,.08);border-bottom-left-radius:5px}
        .msg.bot a{color:var(--rose-deep)}
        .btn-group{align-self:flex-start;display:flex;flex-wrap:wrap;gap:8px;max-width:100%;animation:pop .3s cubic-bezier(.16,1,.3,1) both}
        .btn-chip{padding:8px 14px;border:1.5px solid var(--rose);border-radius:20px;background:#fff;color:var(--rose);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,color .15s,transform .1s}
        .btn-chip:hover{background:var(--rose);color:#fff;transform:translateY(-1px)}
        .btn-chip:active{transform:translateY(0)}
        .btn-chip.used{opacity:.4;cursor:default;pointer-events:none}
        .msg.typing{display:flex;gap:4px;align-items:center;padding:14px}
        .msg.typing span{width:7px;height:7px;border-radius:50%;background:var(--rose);animation:blink 1.4s infinite both}
        .msg.typing span:nth-child(2){animation-delay:.2s}
        .msg.typing span:nth-child(3){animation-delay:.4s}
        @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
        .chat-input{display:flex;gap:8px;padding:12px;flex-shrink:0;background:#fff;border-top:1px solid rgba(42,31,26,.08)}
        .chat-input input{flex:1;padding:11px 15px;border:1px solid rgba(42,31,26,.15);border-radius:22px;font-size:14px;font-family:inherit;outline:none;color:var(--ink);transition:border-color .2s}
        .chat-input input:focus{border-color:var(--rose)}
        .chat-input button{padding:0 20px;border:none;background:var(--rose);color:#fff;border-radius:22px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:background .2s}
        .chat-input button:hover{background:var(--rose-deep)}
        .chat-input button:disabled{opacity:.5;cursor:default}
    </style>
</head>
<body>
    <div class="portal-frame">
        <div class="chat-head">
            <span class="av">💪</span>
            <span>Sheryl's Assistant</span>
        </div>
        <div class="chat-msgs" id="msgs"></div>
        <div class="chat-input">
            <input id="inp" type="text" placeholder="Type a message…" autocomplete="off"/>
            <button id="snd">Send</button>
        </div>
    </div>
    <script>
    (function () {
        var PROXY = "https://why-weight-proxy-qam5mbhetq-uc.a.run.app";

        var URL_BUTTONS = {
            "Sheryl's FREE 3-Day Reset Plan to get the scales moving again": "https://www.whyweightacademy.com/newsletter-opt-in",
            "FREE phone call with Sheryl":                                   "https://whyweightacademy.as.me/schedule/55ad4baf/appointment/16647243/calendar/4410125?appointmentTypeIds[]=16647243",
            "Sheryl's Low Carb Winter Recipe Book \u2014 just $9":           "https://www.whyweightacademy.com/winter-warmers-recipe-ebook",
            "Book a free call with Sheryl":                                  "https://whyweightacademy.as.me/schedule/55ad4baf/appointment/16647243/calendar/4410125?appointmentTypeIds[]=16647243",
            "Find out more about Foundations":                               "https://www.whyweightacademy.com/fat-loss-foundations",
            "Find out more about the Academy":                               "https://www.whyweightacademy.com/",
            "Find out more about Blood Sugar Solution":                      "https://www.whyweightacademy.com/the-blood-sugar-solution",
            "Find out more about the 30/10 Reset":                           "https://www.whyweightacademy.com/the-30-10-reset",
            "Book a 1-1 with Sheryl":                                        "https://www.whyweightacademy.com/appointments"
        };

        var userId = "web-" + Math.random().toString(36).slice(2, 10);
        var sessionId = "";
        var msgs = document.getElementById("msgs");
        var inp  = document.getElementById("inp");
        var snd  = document.getElementById("snd");

        function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
        function linkify(s){return escapeHtml(s).replace(/(https?:\/\/[^\s]+)/g,function(url){var clean=url.replace(/[.,!?]+$/,"");var trail=url.slice(clean.length);return'<a href="'+clean+'" target="_blank" rel="noopener">'+clean+'</a>'+trail})}
        function parseButtons(raw){var btnRe=/\[\[BUTTONS\]\]([\s\S]*?)\[\[\/BUTTONS\]\]/g;var buttons=[];var text=raw.replace(btnRe,function(_,inner){inner.split("\n").forEach(function(line){var l=line.trim();if(l)buttons.push(l)});return""}).trim();return{text:text,buttons:buttons}}
        function scrollBottom(){msgs.scrollTop=msgs.scrollHeight}
        function addMsg(text,who){var d=document.createElement("div");d.className="msg "+who;if(who==="bot")d.innerHTML=linkify(text);else d.textContent=text;msgs.appendChild(d);scrollBottom();return d}
        function addButtons(options){var group=document.createElement("div");group.className="btn-group";options.forEach(function(label){var btn=document.createElement("button");btn.className="btn-chip";btn.textContent=label;btn.addEventListener("click",function(){if(URL_BUTTONS[label]){window.open(URL_BUTTONS[label],"_blank");return}group.querySelectorAll(".btn-chip").forEach(function(c){c.classList.add("used")});sendMessage(label)});group.appendChild(btn)});msgs.appendChild(group);scrollBottom();return group}
        function addBotResponse(raw){var parsed=parseButtons(raw);if(parsed.text)addMsg(parsed.text,"bot");if(parsed.buttons.length)addBotButtons(parsed.buttons)}
        var lastBtnGroup=null;
        function addBotButtons(options){lastBtnGroup=addButtons(options)}
        function disableLastButtons(){if(lastBtnGroup){lastBtnGroup.querySelectorAll(".btn-chip").forEach(function(c){c.classList.add("used")});lastBtnGroup=null}}
        function sendMessage(text){if(!text)return;disableLastButtons();addMsg(text,"user");inp.value="";snd.disabled=true;var typing=document.createElement("div");typing.className="msg bot typing";typing.innerHTML="<span></span><span></span><span></span>";msgs.appendChild(typing);scrollBottom();fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,user_id:userId,session_id:sessionId})}).then(function(r){return r.json()}).then(function(data){typing.remove();if(data.session_id)sessionId=data.session_id;var response=data.response||data.error||"Sorry, something went wrong.";addBotResponse(response);snd.disabled=false;inp.focus()}).catch(function(){typing.remove();addMsg("Sorry, I couldn't connect. Please try again.","bot");snd.disabled=false})}

        addBotResponse(
            "Hi, I'm Sheryl's Virtual Assistant \u2014 how can I help today?\n\n" +
            "[[BUTTONS]]\n" +
            "Sheryl's FREE 3-Day Reset Plan to get the scales moving again\n" +
            "FREE phone call with Sheryl\n" +
            "I'm looking for the right programme for me\n" +
            "Sheryl's Low Carb Winter Recipe Book \u2014 just $9\n" +
            "[[/BUTTONS]]"
        );

        snd.onclick=function(){sendMessage(inp.value.trim())};
        inp.addEventListener("keydown",function(e){if(e.key==="Enter")sendMessage(inp.value.trim())});
        inp.focus();
    })();
    </script>
</body>
</html>
